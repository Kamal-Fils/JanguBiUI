version: 2
updates:
  # Dépendances JS — l'écosystème "npm" gère aussi yarn.lock
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 10
    groups:
      # minor + patch regroupés (faible risque) → 1 PR ; les MAJORS restent isolées
      prod-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions épinglées par SHA (checkout, setup-node, build-push-action…)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: "main"
